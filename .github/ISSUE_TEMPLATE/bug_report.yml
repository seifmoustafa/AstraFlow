name: Bug report
description: Report a reproducible AstraFlow package problem.
title: "Bug: "
labels:
  - bug
body:
  - type: input
    id: package
    attributes:
      label: Package
      description: Which AstraFlow package is affected?
      placeholder: AstraFlow.Mediator 1.5.1
    validations:
      required: true
  - type: input
    id: target-framework
    attributes:
      label: Target framework
      placeholder: net8.0
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the exception message or failing assertion if there is one.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Add a small code sample, test, or repository link.
    validations:
      required: true
